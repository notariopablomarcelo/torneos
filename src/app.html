<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#000000" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<script>
			// Aplicamos la clase .dark a <html> ANTES del primer paint para evitar
			// el flash del tema incorrecto. Lee localStorage; si no hay nada
			// guardado, sigue prefers-color-scheme del sistema.
			(function () {
				try {
					var t = localStorage.getItem('torneos:tema');
					var oscuro =
						t === 'oscuro' ||
						(!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
					if (oscuro) document.documentElement.classList.add('dark');
				} catch (e) {
					// localStorage puede fallar en modo privado; ignoramos.
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body
		data-sveltekit-preload-data="hover"
		class="bg-white text-gray-900 antialiased dark:bg-gray-950 dark:text-gray-100"
	>
		<div style="display: contents">%sveltekit.body%</div>

		<script>
			if ('serviceWorker' in navigator) {
				navigator.serviceWorker.register('/sw.js').then((reg) => {
					reg.addEventListener('updatefound', () => {
						const swNuevo = reg.installing;
						if (!swNuevo) return;
						swNuevo.addEventListener('statechange', () => {
							if (
								swNuevo.state === 'installed' &&
								navigator.serviceWorker.controller
							) {
								window.dispatchEvent(new Event('app-actualizacion-disponible'));
							}
						});
					});
				});

				let recargando = false;
				navigator.serviceWorker.addEventListener('controllerchange', () => {
					if (recargando) return;
					recargando = true;
					window.location.reload();
				});
			}
		</script>
	</body>
</html>
