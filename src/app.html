<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#000000" />
		<link rel="manifest" href="/manifest.webmanifest" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-white text-black antialiased">
		<div style="display: contents">%sveltekit.body%</div>

		<script>
			if ('serviceWorker' in navigator) {
				navigator.serviceWorker.register('/sw.js').then((reg) => {
					reg.addEventListener('updatefound', () => {
						const swNuevo = reg.installing;
						if (!swNuevo) return;
						swNuevo.addEventListener('statechange', () => {
							if (
								swNuevo.state === 'installed' &&
								navigator.serviceWorker.controller
							) {
								window.dispatchEvent(new Event('app-actualizacion-disponible'));
							}
						});
					});
				});

				let recargando = false;
				navigator.serviceWorker.addEventListener('controllerchange', () => {
					if (recargando) return;
					recargando = true;
					window.location.reload();
				});
			}
		</script>
	</body>
</html>
